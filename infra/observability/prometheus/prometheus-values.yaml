server:
  global:
    scrape_interval: 5s
    evaluation_interval: 5s
    scrape_timeout: 4s
  service:
    type: NodePort
    nodePort: 30090
  persistentVolume:
    enabled: false
alertmanager:
  enabled: false
pushgateway:
  enabled: false
serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: benchmark-runner-summary
        metrics_path: /metrics
        static_configs:
          - targets:
              - benchmark-runner.mesh-benchmark-istio.svc.cluster.local:8080
              - benchmark-runner.mesh-benchmark-linkerd.svc.cluster.local:8080

      - job_name: mesh-benchmark-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: drop
            regex: benchmark-runner
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: environment
            regex: mesh-benchmark-(istio|linkerd)
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2